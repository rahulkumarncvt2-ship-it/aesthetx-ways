<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AESTHETX WAYS</title>

<style>
:root{
  --bg-dark:#0b0b0b;
  --bg-light:#f4f4f4;
  --glass-dark:rgba(30,30,30,0.55);
  --glass-light:rgba(255,255,255,0.65);
  --text-dark:#ffffff;
  --text-light:#111111;
}

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Inter",sans-serif;
  background:var(--bg-dark);
  color:var(--text-dark);
  transition:all .4s cubic-bezier(.34,1.56,.64,1);
}

.light{
  background:var(--bg-light);
  color:var(--text-light);
}

.container{
  padding:20px;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.toggle{
  padding:6px 14px;
  border-radius:20px;
  background:var(--glass-dark);
  backdrop-filter:blur(12px);
  cursor:pointer;
}

.light .toggle{
  background:var(--glass-light);
}

.card{
  margin-top:20px;
  padding:20px;
  border-radius:25px;
  background:var(--glass-dark);
  backdrop-filter:blur(16px);
  box-shadow:0 10px 30px rgba(0,0,0,.25);
}

.light .card{
  background:var(--glass-light);
}

.product{
  text-align:center;
}

.product img{
  width:100%;
  border-radius:20px;
  transition:transform .6s cubic-bezier(.34,1.56,.64,1);
}

.product img:active{
  transform:scale(0.96);
}

.price{
  font-size:22px;
  font-weight:700;
  margin:10px 0;
}

.buybar{
  position:fixed;
  bottom:20px;
  left:20px;
  right:20px;
  padding:14px;
  border-radius:30px;
  background:var(--glass-dark);
  backdrop-filter:blur(20px);
  display:flex;
  justify-content:space-between;
  align-items:center;
  animation:slideUp .6s cubic-bezier(.34,1.56,.64,1);
}

.light .buybar{
  background:var(--glass-light);
}

.buybtn{
  padding:12px 26px;
  border-radius:25px;
  background:#0a84ff;
  color:white;
  font-weight:600;
  border:none;
  cursor:pointer;
  transition:transform .25s cubic-bezier(.34,1.56,.64,1);
}

.buybtn:active{
  transform:scale(0.9);
}

@keyframes slideUp{
  from{transform:translateY(100px);opacity:0;}
  to{transform:translateY(0);opacity:1;}
}
</style>
</head>

<body>
<div class="container">
  <div class="header">
    <h2>AESTHETX WAYS</h2>
    <div class="toggle" onclick="toggleMode()">🌗</div>
  </div>

  <div class="card product">
    <img src="https://images.unsplash.com/photo-1520975922203-bbc3c43d0f53" alt="Product">
    <h3>Black Skull Graphic Tee</h3>
    <div class="price">₹1499</div>
  </div>
</div>

<div class="buybar">
  <span>₹1499</span>
  <button class="buybtn">BUY / PAY</button>
</div>

<script>
function toggleMode(){
  document.body.classList.toggle("light");
}
</script>

</body>
  </html>
